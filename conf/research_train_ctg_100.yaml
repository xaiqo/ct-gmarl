# CT-GMARL Training on 100-Node Enterprise Topology

defaults:
  - config
  - model: ct_gmarl
  - override env: enterprise_100
  - override algorithm: ct_gmarl
  - _self_

# Research Overrides
seed: 2024
episodes: 20000
total_steps: 10000000
batch_size: 4096
buffer_size: 32768

# Competitive Pairings
algorithms: [["ct_gmarl"], ["ct_gmarl"]]
blue_algorithm: "ct_gmarl"
red_algorithm: "ct_gmarl"

# Weights & Biases
wandb:
  mode: "online"
  project: "ct-gmarl-research"

# Hydra Organization
hydra:
  run:
    dir: outputs/research_ctg_100_${now:%H-%M}
