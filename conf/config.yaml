defaults:
  - algorithm: ct_gmarl
  - env: apt_espionage
  - _self_

# General Experiment Settings
seed: 2024
smoke_test: false
episodes: 10000
algorithms: null # List of algorithms for sequential/competitive runs
blue_algorithm: ${algorithm} # Default to standard algo
red_algorithm: null # Default to stochastic (None)
timestamp: ??? # Dynamically injected

# Training Defaults (Can be overridden by algorithm configs)
lr: 3e-4
gamma: 0.99
beta: 0.05 
total_steps: 2000000
batch_size: 4096   
buffer_size: 16384  

# Weights & Biases Configuration
wandb:
  project: "ct-gmarl-research"
  mode: "online" 

# Hydra Chronological Organization
hydra:
  run:
    dir: outputs/${algorithm}_${now:%H-%M}
  sweep:
    dir: multirun/${algorithm}_${now:%H-%M}
    subdir: ${hydra.job.num}
