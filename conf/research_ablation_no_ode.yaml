# @package _global_
# ABLATION: CT-GMARL WITHOUT NEURAL ODE (Discrete RNN Baseline)
# Proves the value of continuous-time temporal reasoning.

defaults:
  - config
  - model: ct_gmarl
  - override env: enterprise_100
  - override algorithm: ct_gmarl
  - _self_

# Ablation Flags
model:
  use_ode: false  # Bypasses Neural ODE for standard GRU

seed: 2024
episodes: 20000
total_steps: 10000000
batch_size: 4096
buffer_size: 32768

# Weights & Biases
wandb:
  mode: "online"
  project: "ct-gmarl-research"
  group: "ablation_studies"
  name: "Ablation_No_ODE_100"

# Hydra Organization
hydra:
  run:
    dir: outputs/ablation_no_ode_100_${now:%H-%M}
