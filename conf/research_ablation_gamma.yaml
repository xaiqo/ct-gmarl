# @package _global_
# ABLATION: CT-GMARL WITHOUT CONTINUOUS DISCOUNTING (Discrete Gamma Baseline)
# Proves the value of the exp(-beta * dt) theoretical foundation.

defaults:
  - config
  - model: ct_gmarl
  - override env: enterprise_100
  - override algorithm: ct_gmarl
  - _self_

# Ablation Flags
optimizer:
  use_continuous_discounting: false  # Uses standard discrete exp(-beta) constant

seed: 2024
episodes: 20000
total_steps: 10000000
batch_size: 4096
buffer_size: 32768

# Competitive Pairings
algorithms: [["ct_gmarl"], ["ct_gmarl"]]
blue_algorithm: "ct_gmarl"
red_algorithm: "ct_gmarl"

# Weights & Biases
wandb:
  mode: "online"
  project: "ct-gmarl-research"
  group: "ablation_studies"
  name: "Ablation_Discrete_Gamma_100"

# Hydra Organization
hydra:
  run:
    dir: outputs/ablation_gamma_100_${now:%H-%M}
